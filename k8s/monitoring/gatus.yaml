---
# gatus.yaml — synthetic uptime monitoring for avocado.
#
# Gatus periodically probes internal services and public endpoints and pushes
# failures/recoveries straight to ntfy.sh via its NATIVE ntfy alerting provider
# (no Alertmanager in the path — this is a separate, self-contained pipeline
# from the metrics-based alerts). This is the avocado equivalent of the
# reference's Cloudprober + endpoint VMRules, trimmed to a single lightweight
# pod.
#
# >>> Uses the SAME ntfy topic as ntfy-alertmanager.yaml (default
#     `avocado-alerts`). Change both together if you switch to a private topic.
apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: monitoring
data:
  config.yaml: |
    # Gatus web UI / API listens here; exposed via the Ingress below.
    web:
      port: 8080

    # In-memory store is plenty for a single node — no PVC needed. History is
    # lost on restart, which is fine (alerts are pushed, not polled).
    storage:
      type: memory

    # Push failures + recoveries to ntfy.sh.
    alerting:
      ntfy:
        url: "https://ntfy.sh"
        topic: "avocado-alerts"
        priority: 4
        # Emoji tags per state (ntfy renders these as icons).
        default-alert:
          enabled: true
          # Alert after 3 consecutive failures; resolve after 2 successes.
          failure-threshold: 3
          success-threshold: 2
          send-on-resolved: true

    endpoints:
      # --- In-cluster services (component liveness) --------------------------
      - name: grafana
        group: internal
        url: "http://grafana.monitoring.svc:3000/api/health"
        interval: 1m
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: ntfy

      - name: victoriametrics
        group: internal
        url: "http://vmsingle-victoria-metrics-k8s-stack-vmks.monitoring.svc:8428/health"
        interval: 1m
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: ntfy

      - name: victorialogs
        group: internal
        url: "http://victorialogs.monitoring.svc:9428/health"
        interval: 1m
        conditions:
          - "[STATUS] == 200"
        alerts:
          - type: ntfy

      # --- Public endpoints (reachability + TLS expiry) ----------------------
      - name: rithviknishad.dev
        group: public
        url: "https://rithviknishad.dev"
        interval: 5m
        conditions:
          - "[STATUS] == 200"
          - "[CERTIFICATE_EXPIRATION] > 240h"
        alerts:
          - type: ntfy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: gatus
    app.kubernetes.io/component: uptime
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gatus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gatus
      annotations:
        # Bump to roll the pod when the config changes.
        checksum/config: config-v1
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gatus
          # Pinned to a released tag (multi-arch amd64/arm64).
          image: ghcr.io/twin/gatus:v5.36.0
          env:
            # Point Gatus at the mounted ConfigMap directory (it merges every
            # *.yaml under this path).
            - name: GATUS_CONFIG_PATH
              value: /config
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: gatus-config
---
apiVersion: v1
kind: Service
metadata:
  name: gatus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: gatus
spec:
  selector:
    app.kubernetes.io/name: gatus
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gatus
  namespace: monitoring
spec:
  rules:
    - host: status.avocado.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gatus
                port:
                  number: 8080
    - host: status.rithviknishad.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gatus
                port:
                  number: 8080
