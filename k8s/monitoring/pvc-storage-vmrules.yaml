---
# pvc-storage-vmrules.yaml — VMRule for cluster-wide PVC storage alerts.
# Monitors ALL PVCs in ALL namespaces via kubelet volume stats.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: pvc-storage-alerts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: pvc-storage
    app.kubernetes.io/component: alerting
    app.kubernetes.io/part-of: victoria-metrics-k8s-stack
    app.kubernetes.io/managed-by: kustomize
spec:
  groups:
    - name: pvc-storage.rules
      rules:
        - alert: PVCFillingUp
          annotations:
            description: >-
              PVC {{ $labels.persistentvolumeclaim }} in namespace
              {{ $labels.namespace }} is {{ $value | humanizePercentage }}
              full.
            summary: PVC is filling up (> 80%)
          expr: |-
            (
              kubelet_volume_stats_used_bytes
              /
              kubelet_volume_stats_capacity_bytes
            ) > 0.8
          for: 10m
          labels:
            severity: warning

        - alert: PVCCriticallyFull
          annotations:
            description: >-
              PVC {{ $labels.persistentvolumeclaim }} in namespace
              {{ $labels.namespace }} is {{ $value | humanizePercentage }}
              full. Write failures are imminent.
            summary: PVC is critically full (> 90%)
          expr: |-
            (
              kubelet_volume_stats_used_bytes
              /
              kubelet_volume_stats_capacity_bytes
            ) > 0.9
          for: 5m
          labels:
            severity: critical

        - alert: PVCAlmostOutOfInodes
          annotations:
            description: >-
              PVC {{ $labels.persistentvolumeclaim }} in namespace
              {{ $labels.namespace }} has used {{ $value | humanizePercentage }}
              of its available inodes.
            summary: PVC inode usage is high (> 80%)
          expr: |-
            (
              kubelet_volume_stats_inodes_used
              /
              kubelet_volume_stats_inodes
            ) > 0.8
            and
            kubelet_volume_stats_inodes > 0
          for: 10m
          labels:
            severity: warning
