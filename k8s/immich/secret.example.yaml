# Copy to secret.yaml, set a real DB_PASSWORD, then:
#   kubectl apply -f k8s/immich/secret.yaml
# (secret.yaml is gitignored — never commit it.)
apiVersion: v1
kind: Secret
metadata:
  name: immich-secret
  namespace: immich
stringData:
  # shared by both postgres and immich-server
  DB_PASSWORD: CHANGE_ME
  POSTGRES_PASSWORD: CHANGE_ME
  POSTGRES_USER: immich
  POSTGRES_DB: immich
  DB_HOSTNAME: postgres
  DB_USERNAME: immich
  DB_DATABASE_NAME: immich
  REDIS_HOSTNAME: redis
  REDIS_PORT: "6379"
