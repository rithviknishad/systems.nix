# GitHub Pages configuration for the systems.nix documentation site.
#
# Uses the just-the-docs remote theme (sidebar nav + search + native Mermaid).
# GitHub Pages enables the jekyll-remote-theme and jekyll-relative-links
# plugins by default, so relative ".md" links between pages Just Work.
#
# To publish: repo Settings -> Pages -> Source: "Deploy from a branch",
# Branch: main, Folder: /docs.

title: systems.nix
description: >-
  NixOS + k3s homelab for the host "avocado" — flakes, ZFS/disko,
  Home Manager, sops-nix, Tailscale, Cloudflare Tunnel, and a
  VictoriaMetrics monitoring stack.

remote_theme: just-the-docs/just-the-docs

# Render ```mermaid fenced blocks as diagrams on the published site.
mermaid:
  version: "11.4.1"

# Show a "table of contents" heading list on each page.
heading_anchors: true

# Collapse long code blocks nicely.
color_scheme: dark

aux_links:
  "Repository (GitHub mirror)":
    - "https://github.com/rithviknishad/systems.nix"

aux_links_new_tab: true

# Footer.
last_edit_timestamp: false
back_to_top: true
back_to_top_text: "Back to top"

plugins:
  - jekyll-remote-theme
  - jekyll-relative-links
