# GitHub Pages configuration for the systems.nix documentation site.
#
# Uses the just-the-docs theme (sidebar nav + search + native Mermaid),
# installed as a gem (see docs/Gemfile) and built by GitHub Actions
# (.github/workflows/pages.yml). The jekyll-relative-links plugin lets relative
# ".md" links between pages Just Work.
#
# To publish: repo Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions".

title: systems.nix
description: >-
  NixOS + k3s homelab for the host "avocado" — flakes, ZFS/disko,
  Home Manager, sops-nix, Tailscale, Cloudflare Tunnel, and a
  VictoriaMetrics monitoring stack.

theme: just-the-docs

# Render ```mermaid fenced blocks as diagrams on the published site.
mermaid:
  version: "11.4.1"

# Show a "table of contents" heading list on each page.
heading_anchors: true

# Collapse long code blocks nicely.
color_scheme: dark

aux_links:
  "Repository":
    - "https://github.com/rithviknishad/systems.nix"

aux_links_new_tab: true

# Footer.
last_edit_timestamp: false
back_to_top: true
back_to_top_text: "Back to top"

plugins:
  - jekyll-relative-links
